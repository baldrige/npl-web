name: Fetch Scoresheet Rosters

on:
  schedule:
    # Run daily at 8:00 AM UTC (3:00 AM ET / 4:00 AM ET during DST)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Scoresheet data
        run: node scripts/fetch-scoresheet.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/scoresheet_rosters.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update Scoresheet rosters $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
